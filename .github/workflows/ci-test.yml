name: LUODA CI Test

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-call:
    runs-on: ubuntu-latest
    steps:
      - name: Debug workflow_call
        run: |
          echo "=== Testing flutter-build.yml workflow_call ==="
          echo "Workflow file:"
          cat .github/workflows/flutter-build.yml | head -20
          echo "..."
          echo "File size:"
          wc -l .github/workflows/flutter-build.yml

  call-flutter-build:
    uses: ./.github/workflows/flutter-build.yml
    with:
      upload-artifact: true
      upload-tag: "nightly"
    secrets: inherit
